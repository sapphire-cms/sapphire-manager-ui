<nav class="breadcrumb">
  <ul>
    <li>
      <span class="icon ml-0 mr-2">
        <i class="fa-regular fa-image"></i>
      </span>
      <a (click)="linkClick.emit([])">
        Media
      </a>
    </li>

    @for (link of breadcrumbLinks; track $index) {
      <li>
        <a (click)="linkClick.emit(link.path)">
          {{ link.label }}
        </a>
      </li>
    }
  </ul>
</nav>
